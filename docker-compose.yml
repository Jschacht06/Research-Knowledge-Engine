services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 12
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      NO_PROXY: "ollama,localhost,127.0.0.1,::1"
      no_proxy: "ollama,localhost,127.0.0.1,::1"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  # Cant get this to work on the VM does work fine on docker-desktop
  ollama-init:
     image: ollama/ollama
     environment:
       OLLAMA_HOST: "http://127.0.0.1:11434"
       OLLAMA_CHAT_MODEL: "llama3.1:8b"
       OLLAMA_EMBED_MODEL: "nomic-embed-text"
       NO_PROXY: "ollama,localhost,127.0.0.1,::1"
       no_proxy: "ollama,localhost,127.0.0.1,::1"
     depends_on:
       - ollama
     network_mode: "service:ollama"
     entrypoint:
       - /bin/sh
       - -c
       - |
         until ollama list; do
           echo "Waiting for Ollama to become ready..."
           sleep 2
         done
         ollama pull "$$OLLAMA_EMBED_MODEL"
         ollama pull "$$OLLAMA_CHAT_MODEL"
     restart: "no"
  # Commands to do it manually:
    # docker compose up -d db ollama
    # docker compose exec ollama ollama pull nomic-embed-text
    # docker compose exec ollama ollama pull llama3.1:8b
    # docker compose up -d backend frontend
  backend:
    build: ./backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      JWT_SECRET: "${JWT_SECRET}"
      STORAGE_DIR: "${STORAGE_DIR}"
      FRONTEND_ORIGINS: "${FRONTEND_ORIGINS}"
      ALLOWED_EMAIL_DOMAINS: "${ALLOWED_EMAIL_DOMAINS}"
      AUTH_COOKIE_NAME: "${AUTH_COOKIE_NAME}"
      AUTH_COOKIE_SECURE: "${AUTH_COOKIE_SECURE}"
      AUTH_COOKIE_SAMESITE: "${AUTH_COOKIE_SAMESITE}"

      # Chat/Embeddings: local Ollama
      LLM_PROVIDER: "ollama"
      OLLAMA_BASE_URL: "http://host.docker.internal:11434"
      OLLAMA_CHAT_MODEL: "llama3.1:8b"
      OLLAMA_EMBED_MODEL: "nomic-embed-text"
      BACKEND_WORKERS: "${BACKEND_WORKERS:-2}"
    depends_on:
      db:
        condition: service_healthy
      ollama-init:
         condition: service_completed_successfully
    volumes:
      - files_data:/data/files

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "80:80"
volumes:
  db_data:
  files_data:
  ollama_data:
